name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: cd backend && pip install -e ".[dev]" --break-system-packages

      - name: Lint with ruff
        run: ruff check backend/

      - name: Check formatting with ruff
        run: ruff format --check backend/

      - name: Run tests
        run: cd backend && pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Test
        run: cd frontend && npm run test:run

      - name: Build
        run: cd frontend && npm run build

  docker:
    name: Docker image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Validates the single-container build (frontend + backend) stays green.
      # Loaded into the local daemon but not pushed.
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: loom:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the container
        run: |
          docker run -d --name loom-ci -p 8000:8000 loom:ci
          # Wait for the app to start serving (lifespan init can take a moment).
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/health >/dev/null 2>&1; then
              echo "API is up"; break
            fi
            sleep 2
          done
          curl -fsS http://localhost:8000/api/health
          # The SPA shell must be served at the root.
          curl -fsS http://localhost:8000/ | grep -q '<div id="root">'
          docker rm -f loom-ci
