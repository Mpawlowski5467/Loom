# Pinned backend dependency set for reproducible Docker builds.
#
# Generated from backend/.venv — the environment the full pytest suite passes
# against — via:
#
#   backend/.venv/bin/python -m pip freeze --exclude-editable \
#     | grep -vE '^(loom-backend|.*file://)' \
#     | grep -vE '^(ruff|mypy|pytest|pytest-asyncio|types-PyYAML)==' \
#     > backend/requirements.lock
#
# Regenerate the same way after any intentional dependency change, from a venv
# where the full test suite passes. `loom-backend` itself, editable file://
# installs, and the dev-only tools (the `[project.optional-dependencies] dev`
# set) are excluded on purpose: the Docker image installs the project
# separately with `pip install --no-deps .` (see Dockerfile), and production
# containers should not ship the linter/type-checker/test runner.
